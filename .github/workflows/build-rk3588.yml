name: Build HandBrake for RK3588 (ARM64)

on:
  workflow_dispatch:
    inputs:
      gtk:
        description: 'Build with GTK GUI (for novnc)'
        required: false
        default: 'false'

jobs:
  build-arm64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout HandBrake
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install cross-compile toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu \
            pkg-config \
            nasm \
            cmake \
            meson \
            ninja-build \
            autoconf \
            automake \
            libtool

      - name: Configure HandBrake
        run: |
          ./configure --cross=aarch64-linux-gnu --force

      - name: Build HandBrake
        run: |
          cd build
          make -j$(nproc)

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: handbrake-cli-arm64
          path: build/HandBrakeCLI
          retention-days: 7

  build-gtk:
    runs-on: ubuntu-latest
    if: inputs.gtk == 'true'
    steps:
      - name: Checkout HandBrake
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu \
            libgtk-3-dev \
            libglib2.0-dev \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            libwebkit2gtk-4.1-dev \
            libnotify-dev \
            intltool \
            libgudev-1.0-dev \
            libbluray-dev \
            libdvdnav-dev \
            libdvdread-dev

      - name: Configure with GTK
        run: |
          ./configure --cross=aarch64-linux-gnu --gtk --force

      - name: Build HandBrake
        run: |
          cd build
          make -j$(nproc)

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: handbrake-gtk-arm64
          path: build/HandBrake
          retention-days: 7
