name: Build HandBrake for RK3588 (ARM64)

on:
  workflow_dispatch:
    inputs:
      gtk:
        description: 'Build with GTK GUI (for novnc)'
        required: false
        default: 'false'

jobs:
  build-arm64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout HandBrake
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Install cross-compile toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu \
            pkg-config \
            nasm \
            cmake \
            meson \
            ninja-build \
            autoconf \
            automake \
            libtool \
            m4 \
            python3 \
            libtool-bin \
            wget \
            curl

      - name: Configure HandBrake
        run: |
          export CC=aarch64-linux-gnu-gcc
          export CXX=aarch64-linux-gnu-g++
          export AR=aarch64-linux-gnu-ar
          export STRIP=aarch64-linux-gnu-strip
          export RANLIB=aarch64-linux-gnu-ranlib
          ./configure --cross=aarch64-linux-gnu --force

      - name: Build HandBrake
        run: |
          cd build
          make -j$(nproc)

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: handbrake-cli-arm64
          path: build/HandBrakeCLI
          retention-days: 7
          if-no-files-found: warn

  build-native-arm64:
    runs-on: ubuntu-24.04-arm
    if: inputs.gtk == 'true'
    steps:
      - name: Checkout HandBrake
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            nasm \
            cmake \
            meson \
            ninja-build \
            autoconf \
            automake \
            libtool \
            m4 \
            python3 \
            libgtk-3-dev \
            libglib2.0-dev \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            libwebkit2gtk-4.1-dev \
            libnotify-dev \
            intltool \
            libgudev-1.0-dev \
            libbluray-dev \
            libdvdnav-dev \
            libdvdread-dev \
            libass-dev \
            libmp3lame-dev \
            libopus-dev \
            libspeex-dev \
            libvpx-dev

      - name: Configure with GTK
        run: |
          ./configure --gtk --force

      - name: Build HandBrake
        run: |
          cd build
          make -j$(nproc)

      - name: Upload GTK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: handbrake-gtk-arm64
          path: |
            build/HandBrake
            build/HandBrakeCLI
          retention-days: 7
          if-no-files-found: warn
