name: Build HandBrake for RK3588 (ARM64)

on:
  push:
    branches: [master]
    paths:
      - '.github/workflows/build-rk3588.yml'
      - 'make/**'
      - 'gtk/**'
      - 'libhb/**'
      - 'configure'
      - 'GNUmakefile'
  workflow_dispatch:
    inputs:
      gtk:
        description: 'Build with GTK GUI (for novnc)'
        required: false
        default: 'true'

jobs:
  build-cli:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout HandBrake
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            nasm \
            cmake \
            meson \
            ninja-build \
            autoconf \
            automake \
            libtool \
            libtool-bin \
            m4 \
            python3 \
            python3-pip \
            wget \
            curl \
            libass-dev \
            libmp3lame-dev \
            libopus-dev \
            libspeex-dev \
            libvpx-dev \
            libbluray-dev \
            libdvdnav-dev \
            libdvdread-dev \
            libjansson-dev \
            bzip2 \
            zlib1g-dev \
            libnuma-dev

      - name: Configure HandBrake CLI
        run: |
          ./configure --disable-gtk --force
          ls -la build/

      - name: Build HandBrake CLI
        run: |
          cd build
          make -j$(nproc)

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: handbrake-cli-arm64
          path: build/HandBrakeCLI
          retention-days: 7
          if-no-files-found: warn

build-gtk:
  runs-on: ubuntu-24.04-arm
  if: github.event_name == 'push' || inputs.gtk == 'true'
    steps:
      - name: Checkout HandBrake
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            nasm \
            cmake \
            meson \
            ninja-build \
            autoconf \
            automake \
            libtool \
            libtool-bin \
            m4 \
            python3 \
            python3-pip \
            wget \
            curl \
          libgtk-4-dev \
          libglib2.0-dev \
          libgstreamer1.0-dev \
          libgstreamer-plugins-base1.0-dev \
          libwebkit2gtk-4.1-dev \
          libnotify-dev \
          intltool \
          libgudev-1.0-dev \
          libadwaita-1-dev \
            libass-dev \
            libmp3lame-dev \
            libopus-dev \
            libspeex-dev \
            libvpx-dev \
            libbluray-dev \
            libdvdnav-dev \
            libdvdread-dev \
            libjansson-dev \
            libx264-dev \
            libx265-dev \
            bzip2 \
            zlib1g-dev \
            libnuma-dev

      - name: Configure HandBrake GTK
        run: |
          ./configure --gtk --force
          ls -la build/

      - name: Build HandBrake GTK
        run: |
          cd build
          make -j$(nproc)

    - name: List build outputs
      run: |
        echo "=== Build directory contents ==="
        ls -la build/
        echo "=== GTK build directory contents ==="
        ls -la build/gtk/ 2>/dev/null || echo "No gtk subdir"
        echo "=== Looking for ghb binary ==="
        find build -name "ghb" -type f 2>/dev/null

    - name: Upload GTK artifact
      uses: actions/upload-artifact@v4
      with:
        name: handbrake-gtk-arm64
        path: |
          build/gtk/ghb
          build/HandBrakeCLI
        retention-days: 7
        if-no-files-found: warn
