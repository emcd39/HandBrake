name: Build Docker Image

on:
  workflow_dispatch:
    inputs:
      push_image:
        description: "Push image to GHCR"
        required: false
        default: true
        type: boolean
      image_tag:
        description: "Additional image tag"
        required: false
        default: ""
        type: string
  push:
    branches:
      - master
    paths:
      - ".github/workflows/docker-build.yml"
      - "docker/**"
      - "gtk/**"
      - "libhb/**"
      - "contrib/**"
      - "make/**"
      - "configure"
      - "GNUmakefile"
  pull_request:
    paths:
      - ".github/workflows/docker-build.yml"
      - "docker/**"
      - "gtk/**"
      - "libhb/**"
      - "contrib/**"
      - "make/**"
      - "configure"
      - "GNUmakefile"

env:
  IMAGE_NAME: ghcr.io/emcd39/handbrake-rk3588

jobs:
  docker:
    name: Build RK3588 Docker image
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Derive image metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          DOCKER_IMAGE_VERSION="${GITHUB_SHA::7}"
          PUSH_IMAGE=false

          if [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF_NAME}" == "master" ]]; then
            PUSH_IMAGE=true
          elif [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" && "${{ inputs.push_image }}" == "true" ]]; then
            PUSH_IMAGE=true
          fi

          TAGS="${IMAGE_NAME}:sha-${GITHUB_SHA::7}"

          if [[ "${GITHUB_REF_NAME}" == "master" ]]; then
            TAGS="${TAGS},${IMAGE_NAME}:latest"
          fi

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" && -n "${{ inputs.image_tag }}" ]]; then
            TAGS="${TAGS},${IMAGE_NAME}:${{ inputs.image_tag }}"
            DOCKER_IMAGE_VERSION="${{ inputs.image_tag }}"
          fi

          {
            echo "push_image=${PUSH_IMAGE}"
            echo "docker_image_version=${DOCKER_IMAGE_VERSION}"
            echo "tags=${TAGS}"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: steps.meta.outputs.push_image == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/arm64
          push: ${{ steps.meta.outputs.push_image == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            DOCKER_IMAGE_VERSION=${{ steps.meta.outputs.docker_image_version }}
            HANDBRAKE_VERSION=${{ steps.meta.outputs.docker_image_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Export image as artifact
        if: steps.meta.outputs.push_image != 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/arm64
          outputs: type=docker,dest=/tmp/handbrake-rk3588-arm64.tar
          build-args: |
            DOCKER_IMAGE_VERSION=${{ steps.meta.outputs.docker_image_version }}
            HANDBRAKE_VERSION=${{ steps.meta.outputs.docker_image_version }}
          cache-from: type=gha

      - name: Upload image artifact
        if: steps.meta.outputs.push_image != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: handbrake-rk3588-image-arm64
          path: /tmp/handbrake-rk3588-arm64.tar
          retention-days: 7
