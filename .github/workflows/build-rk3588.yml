name: Build HandBrake RK3588

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04-arm

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            nasm \
            cmake \
            meson \
            ninja-build \
            autoconf \
            automake \
            libtool \
            libtool-bin \
            m4 \
            git \
            python3 \
            python3-pip \
            curl \
            wget \
            ccache \
            libgtk-4-dev \
            libglib2.0-dev \
            libgudev-1.0-dev \
            libnotify-dev \
            libadwaita-1-dev \
            libass-dev \
            libmp3lame-dev \
            libopus-dev \
            libspeex-dev \
            libvpx-dev \
            libbluray-dev \
            libdvdnav-dev \
            libdvdread-dev \
            libjansson-dev \
            libx264-dev \
            libx265-dev \
            libturbojpeg-dev \
            libogg-dev \
            libvorbis-dev \
            libtheora-dev \
            libsvtav1-dev \
            libxml2-dev \
            libdrm-dev \
            libnuma-dev \
            zlib1g-dev \
            bzip2 \
            dpkg-dev

      - name: Enable ccache
        run: |
          mkdir -p ~/.ccache
          echo "max_size = 2G" > ~/.ccache/ccache.conf
          echo "/usr/lib/ccache" >> $GITHUB_PATH
          
      - name: Build rkmpp
        run: |
          git clone --depth 1 https://gitee.com/nyanmisaka/mpp.git
          cd mpp

          mkdir rkmpp_build
          cd rkmpp_build
          cmake \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=ON \
            -DBUILD_TEST=OFF \
            ..

          make -j$(nproc)
          sudo make install

      - name: Build rkrga
        run: |
          mkdir -p ~/dev
          cd ~/dev
          git clone -b jellyfin-rga --depth=1 https://gitee.com/nyanmisaka/rga.git rkrga

          meson setup rkrga rkrga_build \
              --prefix=/usr \
              --libdir=lib \
              --buildtype=release \
              --default-library=shared \
              -Dcpp_args=-fpermissive \
              -Dlibdrm=false \
              -Dlibrga_demo=false

          ninja -C rkrga_build
          sudo ninja -C rkrga_build install
      
      - name: Configure HandBrake
        run: |
          ./configure \
            --enable-gtk \
            --enable-rkmpp \
            --force

      - name: Build HandBrake
        run: |
          cd build
          make -j$(nproc)

      - name: Strip binaries
        run: |
          strip build/HandBrakeCLI || true
          strip build/gtk/src/ghb || true

      - name: Prepare package structure
        run: |
          mkdir -p pkg/usr/bin
          cp build/HandBrakeCLI pkg/usr/bin/
          cp build/gtk/src/ghb pkg/usr/bin/ || true

      - name: Build DEB package
        run: |
          mkdir -p pkg/DEBIAN
          VERSION=$(git describe --tags --always || echo "0.0.0")
          cat <<EOF > pkg/DEBIAN/control
          Package: handbrake-rk3588
          Version: ${VERSION}
          Section: video
          Priority: optional
          Architecture: arm64
          Maintainer: rk3588 build
          Description: HandBrake with RK3588 rkmpp hardware acceleration
          EOF
          dpkg-deb --build pkg handbrake-rk3588_${VERSION}_arm64.deb

      - name: Package tar.gz
        run: |
          mkdir dist
          cp build/HandBrakeCLI dist/
          cp build/gtk/src/ghb dist/ || true
          tar -czf handbrake-rk3588-arm64.tar.gz -C dist .

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: handbrake-rk3588
          path: |
            handbrake-rk3588-arm64.tar.gz
            handbrake-rk3588_*_arm64.deb

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            handbrake-rk3588-arm64.tar.gz
            handbrake-rk3588_*_arm64.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
