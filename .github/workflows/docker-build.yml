name: Build Docker Image and Debian Package

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Package version'
        required: true
        default: '1.0.0'
  push:
    branches: [master]
    paths:
      - 'docker/**'
      - 'packaging/**'
      - '.github/workflows/docker-build.yml'

jobs:
  build-docker:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download GTK artifact from latest build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh run download --repo emcd39/HandBrake --pattern "handbrake-gtk-rkmpp-arm64" --dir artifacts || true
          gh run download --repo emcd39/HandBrake --pattern "handbrake-cli-rkmpp-arm64" --dir artifacts || true
          ls -la artifacts/ || echo "No artifacts found"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ inputs.version || '1.0.0' }}
          build-args: |
            HANDBRAKE_VERSION=${{ inputs.version || '1.0.0' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-deb:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download GTK artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh run download --repo emcd39/HandBrake --pattern "handbrake-gtk-rkmpp-arm64" --dir artifacts || true
          gh run download --repo emcd39/HandBrake --pattern "handbrake-cli-rkmpp-arm64" --dir artifacts || true

      - name: Build Debian package
        run: |
          chmod +x packaging/build-deb.sh
          ./packaging/build-deb.sh "${{ inputs.version || '1.0.0' }}" artifacts

      - name: Upload Debian package
        uses: actions/upload-artifact@v4
        with:
          name: handbrake-rk3588-deb
          path: "*.deb"
          retention-days: 30
