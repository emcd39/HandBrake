name: Build HandBrake for RK3588 (ARM64)

on:
  push:
    branches: [master]
    paths:
      - '.github/workflows/build-rk3588.yml'
      - 'make/**'
      - 'gtk/**'
      - 'libhb/**'
      - 'contrib/**'
      - 'configure'
      - 'GNUmakefile'
  workflow_dispatch:
    inputs:
      gtk:
        description: 'Build with GTK GUI (for novnc)'
        required: false
        default: 'true'
      rkmpp:
        description: 'Enable RKMPP hardware codec'
        required: false
        default: 'true'

jobs:
  build-cli:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout HandBrake
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
          build-essential \
          pkg-config \
          nasm \
          cmake \
          meson \
          ninja-build \
          autoconf \
          automake \
          libtool \
          libtool-bin \
          m4 \
          python3 \
          python3-pip \
          wget \
          curl \
          git \
          libdrm-dev \
          libgtk-4-dev \
          libglib2.0-dev \
          libgstreamer1.0-dev \
          libgstreamer-plugins-base1.0-dev \
          libwebkit2gtk-4.1-dev \
          libnotify-dev \
          libadwaita-1-dev \
          libass-dev \
          libmp3lame-dev \
          libopus-dev \
          libspeex-dev \
          libvpx-dev \
          libbluray-dev \
          libdvdnav-dev \
          libdvdread-dev \
          libjansson-dev \
          libx264-dev \
          libx265-dev \
          bzip2 \
          zlib1g-dev \
          libnuma-dev \
          libturbojpeg-dev \
          libogg-dev \
          libvorbis-dev \
          libtheora-dev \
          libsvtav1-dev \
          libxml2-dev

      - name: Clone RKMPP (nyanmisaka)
        run: |
          mkdir -p deps
          cd deps
          git clone --depth 1 https://gitee.com/nyanmisaka/mpp.git rkmpp
          echo "RKMPP_DIR=$(pwd)/rkmpp" >> $GITHUB_ENV

      - name: Clone RKRGA (nyanmisaka jellyfin-rga branch)
        run: |
          mkdir -p deps
          cd deps
          git clone --depth 1 --branch jellyfin-rga https://gitee.com/nyanmisaka/rga.git rkrga
          echo "RKRGA_DIR=$(pwd)/rkrga" >> $GITHUB_ENV

      - name: Build and install RKMPP
        run: |
          cd deps/rkmpp
          mkdir -p build && cd build
          cmake .. -DCMAKE_INSTALL_PREFIX=/usr/local
          make -j$(nproc)
          sudo make install

      - name: Build and install RKRGA (meson)
        run: |
          cd deps/rkrga
          meson setup rkrga_build \
            --prefix=/usr \
            --libdir=lib \
            --buildtype=release \
            --default-library=shared \
            -Dcpp_args=-fpermissive \
            -Dlibdrm=false \
            -Dlibrga_demo=false
          meson configure rkrga_build
          ninja -C rkrga_build install

      - name: Configure HandBrake with RKMPP
        run: |
          export PKG_CONFIG_PATH=/usr/local/lib/pkgconfig:/usr/lib/pkgconfig:$PKG_CONFIG_PATH
          ./configure --disable-gtk --enable-rkmpp --force
          ls -la build/

      - name: Build HandBrake CLI
        run: |
          cd build
          make -j$(nproc)

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: handbrake-cli-rkmpp-arm64
          path: build/HandBrakeCLI
          retention-days: 7
          if-no-files-found: warn

  build-gtk:
    runs-on: ubuntu-24.04-arm
    if: ${{ github.event_name == 'push' || inputs.gtk == 'true' }}
    steps:
      - name: Checkout HandBrake
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
          build-essential \
          pkg-config \
          nasm \
          cmake \
          meson \
          ninja-build \
          autoconf \
          automake \
          libtool \
          libtool-bin \
          m4 \
          python3 \
          python3-pip \
          wget \
          curl \
          git \
          libdrm-dev \
          libgtk-4-dev \
          libglib2.0-dev \
          libgstreamer1.0-dev \
          libgstreamer-plugins-base1.0-dev \
          libwebkit2gtk-4.1-dev \
          libnotify-dev \
          intltool \
          libgudev-1.0-dev \
          libadwaita-1-dev \
          libass-dev \
          libmp3lame-dev \
          libopus-dev \
          libspeex-dev \
          libvpx-dev \
          libbluray-dev \
          libdvdnav-dev \
          libdvdread-dev \
          libjansson-dev \
          libx264-dev \
          libx265-dev \
          bzip2 \
          zlib1g-dev \
          libnuma-dev \
          libturbojpeg-dev \
          libogg-dev \
          libvorbis-dev \
          libtheora-dev \
          libsvtav1-dev \
          libxml2-dev

      - name: Clone RKMPP (nyanmisaka)
        run: |
          mkdir -p deps
          cd deps
          git clone --depth 1 https://gitee.com/nyanmisaka/mpp.git rkmpp
          echo "RKMPP_DIR=$(pwd)/rkmpp" >> $GITHUB_ENV

      - name: Clone RKRGA (nyanmisaka jellyfin-rga branch)
        run: |
          mkdir -p deps
          cd deps
          git clone --depth 1 --branch jellyfin-rga https://gitee.com/nyanmisaka/rga.git rkrga
          echo "RKRGA_DIR=$(pwd)/rkrga" >> $GITHUB_ENV

      - name: Build and install RKMPP
        run: |
          cd deps/rkmpp
          mkdir -p build && cd build
          cmake .. -DCMAKE_INSTALL_PREFIX=/usr/local
          make -j$(nproc)
          sudo make install

      - name: Build and install RKRGA (meson)
        run: |
          cd deps/rkrga
          meson setup rkrga_build \
            --prefix=/usr \
            --libdir=lib \
            --buildtype=release \
            --default-library=shared \
            -Dcpp_args=-fpermissive \
            -Dlibdrm=false \
            -Dlibrga_demo=false
          meson configure rkrga_build
          ninja -C rkrga_build install

      - name: Configure HandBrake GTK with RKMPP
        run: |
          export PKG_CONFIG_PATH=/usr/local/lib/pkgconfig:/usr/lib/pkgconfig:$PKG_CONFIG_PATH
          ./configure --enable-gtk --enable-rkmpp --force
          ls -la build/

      - name: Build HandBrake GTK
        run: |
          cd build
          make -j$(nproc) 2>&1 | tee build.log
          echo "=== Build log tail ==="
          tail -100 build.log

      - name: List build outputs
        run: |
          echo "=== Build directory contents ==="
          ls -la build/
          echo "=== GTK build directory contents ==="
          ls -la build/gtk/ 2>/dev/null || echo "No gtk subdir"
          echo "=== Looking for ghb binary ==="
          find build -name "ghb" -type f 2>/dev/null

      - name: Upload GTK artifact
        uses: actions/upload-artifact@v4
        with:
          name: handbrake-gtk-rkmpp-arm64
          path: |
            build/gtk/src/ghb
            build/HandBrakeCLI
          retention-days: 7
          if-no-files-found: warn
