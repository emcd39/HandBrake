services:
  handbrake-rk3588:
    image: emcd39/handbrake-rk3588:latest
    container_name: handbrake-rk3588
    restart: unless-stopped

    ports:
      - "5800:5800"
      - "5900:5900"

    environment:
      TZ: Asia/Shanghai
      LANG: zh_CN.UTF-8
      LANGUAGE: zh_CN:zh
      LC_ALL: zh_CN.UTF-8
      KEEP_APP_RUNNING: "1"
      CLEAN_TMP_DIR: "1"
      UMASK: "002"
      TAKE_CONFIG_OWNERSHIP: "1"
      USER_ID: "0"
      GROUP_ID: "0"

    volumes:
      - ./config:/config
      - ./storage:/storage
      - ./watch:/watch
      - ./output:/output
      - /lib/modules:/lib/modules:ro

    devices:
      - /dev/dri:/dev/dri
      - /dev/mpp_service:/dev/mpp_service
      - /dev/rga:/dev/rga
      - /dev/dma_heap:/dev/dma_heap

    privileged: true
