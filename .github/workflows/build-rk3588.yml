name: Build HandBrake for RK3588 (ARM64)

on:
  push:
    branches: [master]
    paths:
    - '.github/workflows/build-rk3588.yml'
    - 'make/**'
    - 'gtk/**'
    - 'libhb/**'
    - 'contrib/**'
    - 'configure'
    - 'GNUmakefile'
  workflow_dispatch:
    inputs:
      gtk:
        description: 'Build with GTK GUI (for novnc)'
        required: false
        default: 'true'

jobs:
  build-cli:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout HandBrake
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

- name: Install build dependencies
  run: |
    sudo apt-get update
    sudo apt-get install -y \
    build-essential \
    pkg-config \
    nasm \
    cmake \
    meson \
    ninja-build \
    autoconf \
    automake \
    libtool \
    libtool-bin \
    m4 \
    python3 \
    python3-pip \
    wget \
    curl \
    libgtk-4-dev \
    libglib2.0-dev \
    libgstreamer1.0-dev \
    libgstreamer-plugins-base1.0-dev \
    libwebkit2gtk-4.1-dev \
    libnotify-dev \
    libadwaita-1-dev \
    libass-dev \
    libmp3lame-dev \
    libopus-dev \
    libspeex-dev \
    libvpx-dev \
    libbluray-dev \
    libdvdnav-dev \
    libdvdread-dev \
    libjansson-dev \
    libx264-dev \
    libx265-dev \
    bzip2 \
    zlib1g-dev \
    libnuma-dev \
    libturbojpeg-dev \
    libogg-dev \
    libvorbis-dev \
    libtheora-dev \
    libsvtav1-dev \
    libxml2-dev \
    libdrm-dev

      - name: Pre-download ffmpeg-rockchip
        run: |
          mkdir -p download
          git clone --depth 1 --branch 8.0 https://github.com/nyanmisaka/ffmpeg-rockchip.git e9c9072bd7c1cbcd2800df2a9c45a8d976a88b14
          tar -czf download/e9c9072bd7c1cbcd2800df2a9c45a8d976a88b14.tar.gz e9c9072bd7c1cbcd2800df2a9c45a8d976a88b14
          rm -rf e9c9072bd7c1cbcd2800df2a9c45a8d976a88b14

      - name: Configure HandBrake CLI
        run: |
          ./configure --disable-gtk --disable-rkmpp --force
          ls -la build/

      - name: Build HandBrake CLI
        run: |
          cd build
          make -j$(nproc)

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: handbrake-cli-arm64
          path: build/HandBrakeCLI
          retention-days: 7
          if-no-files-found: warn

  build-gtk:
    runs-on: ubuntu-24.04-arm
    if: ${{ github.event_name == 'push' || inputs.gtk == 'true' }}
    steps:
      - name: Checkout HandBrake
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            nasm \
            cmake \
            meson \
            ninja-build \
            autoconf \
            automake \
            libtool \
            libtool-bin \
            m4 \
            python3 \
            python3-pip \
            wget \
            curl \
            libgtk-4-dev \
            libglib2.0-dev \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            libwebkit2gtk-4.1-dev \
            libnotify-dev \
            intltool \
            libgudev-1.0-dev \
            libadwaita-1-dev \
            libass-dev \
            libmp3lame-dev \
            libopus-dev \
            libspeex-dev \
            libvpx-dev \
            libbluray-dev \
            libdvdnav-dev \
            libdvdread-dev \
            libjansson-dev \
            libx264-dev \
            libx265-dev \
            bzip2 \
            zlib1g-dev \
            libnuma-dev \
            libturbojpeg-dev \
            libogg-dev \
            libvorbis-dev \
            libtheora-dev \
            libsvtav1-dev \
            libxml2-dev \
            libdrm-dev

      - name: Pre-download ffmpeg-rockchip
        run: |
          mkdir -p download
          git clone --depth 1 --branch 8.0 https://github.com/nyanmisaka/ffmpeg-rockchip.git e9c9072bd7c1cbcd2800df2a9c45a8d976a88b14
          tar -czf download/e9c9072bd7c1cbcd2800df2a9c45a8d976a88b14.tar.gz e9c9072bd7c1cbcd2800df2a9c45a8d976a88b14
          rm -rf e9c9072bd7c1cbcd2800df2a9c45a8d976a88b14

      - name: Configure HandBrake GTK
        run: |
          ./configure --enable-gtk --disable-rkmpp --force
          ls -la build/

      - name: Build HandBrake GTK
        run: |
          cd build
          make -j$(nproc) 2>&1 | tee build.log
          echo "=== Build log tail ==="
          tail -100 build.log

      - name: List build outputs
        run: |
          echo "=== Build directory contents ==="
          ls -la build/
          echo "=== GTK build directory contents ==="
          ls -la build/gtk/ 2>/dev/null || echo "No gtk subdir"
          echo "=== Looking for ghb binary ==="
          find build -name "ghb" -type f 2>/dev/null
          echo "=== Check if meson was invoked ==="
          cat build/gtk/build.ninja 2>/dev/null | head -20 || echo "No build.ninja found"

      - name: Upload GTK artifact
        uses: actions/upload-artifact@v4
        with:
          name: handbrake-gtk-arm64
          path: |
            build/gtk/src/ghb
            build/HandBrakeCLI
          retention-days: 7
          if-no-files-found: warn
