name: Build Docker Image

on:
  workflow_dispatch:
    inputs:
      source_run_id:
        description: "build-rk3588 workflow run ID to package"
        required: false
        type: string
      source_tag:
        description: "Release tag to package, for example rk3588-abcdef0"
        required: false
        default: ""
        type: string
      push_image:
        description: "Push image to GHCR"
        required: false
        default: true
        type: boolean
      image_tag:
        description: "Additional image tag"
        required: false
        default: ""
        type: string
  workflow_run:
    workflows:
      - Build HandBrake for RK3588 (ARM64)
    types:
      - completed

env:
  IMAGE_NAME: ghcr.io/emcd39/handbrake-rk3588

jobs:
  docker:
    name: Build RK3588 Docker image
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       (github.event.workflow_run.head_branch == 'master' ||
        github.event.workflow_run.event == 'workflow_dispatch'))
    runs-on: ubuntu-24.04-arm
    permissions:
      actions: read
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Derive image metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_run" ]]; then
            SOURCE_RUN_ID="${{ github.event.workflow_run.id }}"
            SOURCE_SHA="${{ github.event.workflow_run.head_sha }}"
            SOURCE_TAG="rk3588-${SOURCE_SHA::7}"
            PUSH_IMAGE=true
          else
            SOURCE_RUN_ID="${{ inputs.source_run_id }}"
            SOURCE_SHA="${GITHUB_SHA}"
            SOURCE_TAG="${{ inputs.source_tag }}"
            PUSH_IMAGE=false
            if [[ "${{ inputs.push_image }}" == "true" ]]; then
              PUSH_IMAGE=true
            fi
          fi

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" && -n "${SOURCE_RUN_ID}" && -z "${SOURCE_TAG}" ]]; then
            SOURCE_SHA="$(gh api "repos/${{ github.repository }}/actions/runs/${SOURCE_RUN_ID}" --jq '.head_sha')"
            SOURCE_TAG="rk3588-${SOURCE_SHA::7}"
          fi

          if [[ -z "${SOURCE_TAG}" ]]; then
            echo "Either source_tag or source_run_id must be provided for workflow_dispatch." >&2
            exit 1
          fi

          DOCKER_IMAGE_VERSION="${SOURCE_SHA::7}"
          TAGS="${IMAGE_NAME}:sha-${SOURCE_SHA::7}"

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_run" ]]; then
            TAGS="${TAGS},${IMAGE_NAME}:latest"
          fi

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" && -n "${{ inputs.image_tag }}" ]]; then
            TAGS="${TAGS},${IMAGE_NAME}:${{ inputs.image_tag }}"
            DOCKER_IMAGE_VERSION="${{ inputs.image_tag }}"
          fi

          {
            echo "source_run_id=${SOURCE_RUN_ID}"
            echo "source_sha=${SOURCE_SHA}"
            echo "source_tag=${SOURCE_TAG}"
            echo "push_image=${PUSH_IMAGE}"
            echo "docker_image_version=${DOCKER_IMAGE_VERSION}"
            echo "tags=${TAGS}"
          } >> "$GITHUB_OUTPUT"

      - name: Download GTK release bundle
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/handbrake-gtk-rkmpp-arm64 /tmp/handbrake-release
          rm -f /tmp/handbrake-release/handbrake-gtk-rkmpp-arm64-bundle.tar.gz
          for attempt in 1 2 3 4 5; do
            if gh release download "${{ steps.meta.outputs.source_tag }}" \
              --repo "${{ github.repository }}" \
              --pattern handbrake-gtk-rkmpp-arm64-bundle.tar.gz \
              --dir /tmp/handbrake-release; then
              break
            fi
            if [[ "$attempt" == "5" ]]; then
              echo "Failed to download GTK release bundle after ${attempt} attempts." >&2
              gh release view "${{ steps.meta.outputs.source_tag }}" --repo "${{ github.repository }}" || true
              exit 1
            fi
            sleep 15
          done
          tar -xzf /tmp/handbrake-release/handbrake-gtk-rkmpp-arm64-bundle.tar.gz \
            -C artifacts/handbrake-gtk-rkmpp-arm64
          find artifacts/handbrake-gtk-rkmpp-arm64 -maxdepth 3 -type f | sort
          test -f artifacts/handbrake-gtk-rkmpp-arm64/bundle/bin/ghb
          test -f artifacts/handbrake-gtk-rkmpp-arm64/bundle/bin/HandBrakeCLI

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: steps.meta.outputs.push_image == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/arm64
          push: ${{ steps.meta.outputs.push_image == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            DOCKER_IMAGE_VERSION=${{ steps.meta.outputs.docker_image_version }}
            HANDBRAKE_VERSION=${{ steps.meta.outputs.docker_image_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Export image as artifact
        if: steps.meta.outputs.push_image != 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/arm64
          outputs: type=docker,dest=/tmp/handbrake-rk3588-arm64.tar
          build-args: |
            DOCKER_IMAGE_VERSION=${{ steps.meta.outputs.docker_image_version }}
            HANDBRAKE_VERSION=${{ steps.meta.outputs.docker_image_version }}
          cache-from: type=gha

      - name: Upload image artifact
        if: steps.meta.outputs.push_image != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: handbrake-rk3588-image-arm64
          path: /tmp/handbrake-rk3588-arm64.tar
          retention-days: 7
