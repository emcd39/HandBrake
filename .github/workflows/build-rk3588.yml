name: Build HandBrake for RK3588 (ARM64)

on:
  push:
    branches: [master]
    paths:
      - '.github/workflows/build-rk3588.yml'
      - 'make/**'
      - 'gtk/**'
      - 'libhb/**'
      - 'contrib/**'
      - 'configure'
      - 'GNUmakefile'
  workflow_dispatch:
    inputs:
      gtk:
        description: 'Build with GTK GUI (for novnc)'
        required: false
        default: 'true'
      rkmpp:
        description: 'Enable RKMPP hardware codec'
        required: false
        default: 'true'

jobs:
  build-cli:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout HandBrake
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
          build-essential \
          pkg-config \
          nasm \
          cmake \
          meson \
          ninja-build \
          autoconf \
          automake \
          libtool \
          libtool-bin \
          m4 \
          python3 \
          python3-pip \
          wget \
          curl \
          git \
          libdrm-dev \
          libgtk-4-dev \
          libglib2.0-dev \
          libgstreamer1.0-dev \
          libgstreamer-plugins-base1.0-dev \
          libwebkit2gtk-4.1-dev \
          libnotify-dev \
          intltool \
          libgudev-1.0-dev \
          libadwaita-1-dev \
          libass-dev \
          libmp3lame-dev \
          libopus-dev \
          libspeex-dev \
          libvpx-dev \
          libbluray-dev \
          libdvdnav-dev \
          libdvdread-dev \
          libjansson-dev \
          libx264-dev \
          libx265-dev \
          bzip2 \
          zlib1g-dev \
          libnuma-dev \
          libturbojpeg-dev \
          libogg-dev \
          libvorbis-dev \
          libtheora-dev \
          libsvtav1-dev \
          libxml2-dev

      - name: Clone RKMPP (nyanmisaka)
        run: |
          mkdir -p deps
          cd deps
          git clone --depth 1 https://github.com/emcd39/mpp.git rkmpp
          echo "RKMPP_DIR=$(pwd)/rkmpp" >> $GITHUB_ENV

      - name: Clone RKRGA (nyanmisaka jellyfin-rga branch)
        run: |
          mkdir -p deps
          cd deps
          git clone --depth 1 --branch jellyfin-rga https://github.com/emcd39/rga.git rkrga
          echo "RKRGA_DIR=$(pwd)/rkrga" >> $GITHUB_ENV

      - name: Build and install RKMPP
        run: |
          cd deps/rkmpp
          mkdir -p build && cd build
          cmake .. -DCMAKE_INSTALL_PREFIX=/usr/local
          make -j$(nproc)
          sudo make install

      - name: Build and install RKRGA (meson)
        run: |
          cd deps/rkrga
          meson setup rkrga_build \
            --prefix=/usr/local \
            --libdir=lib \
            --buildtype=release \
            --default-library=shared \
            -Dcpp_args=-fpermissive \
            -Dlibdrm=false \
            -Dlibrga_demo=false
          meson configure rkrga_build
          ninja -C rkrga_build
          sudo ninja -C rkrga_build install

      - name: Configure HandBrake with RKMPP
        run: |
          export PKG_CONFIG_PATH=/usr/local/lib/pkgconfig:/usr/lib/pkgconfig:$PKG_CONFIG_PATH
          # Reuse the GTK-enabled configuration path, which is currently the
          # only verified-successful Linux ARM64 path in CI. We still publish
          # just the CLI binary from this job.
          ./configure --enable-gtk --enable-rkmpp --force
          ls -la build/

      - name: Build HandBrake CLI
        run: |
          cd build
          make -j$(nproc)

      - name: Prepare CLI runtime bundle
        run: |
          mkdir -p bundle/bin bundle/lib
          cp build/HandBrakeCLI bundle/bin/
          cp /usr/local/lib/librockchip_mpp.so* bundle/lib/ 2>/dev/null || true
          cp /usr/local/lib/librga.so* bundle/lib/ 2>/dev/null || true
          cp /usr/local/lib/libmpp.so* bundle/lib/ 2>/dev/null || true
          cp /usr/local/lib/libdrm.so* bundle/lib/ 2>/dev/null || true
          ldd bundle/bin/HandBrakeCLI || true

      - name: Build CLI Debian package
        run: |
          PKGROOT="$PWD/pkg-cli"
          rm -rf "$PKGROOT" handbrake-cli-rkmpp-arm64.deb
          mkdir -p "$PKGROOT/DEBIAN" "$PKGROOT/opt/handbrake-rk3588/bin" "$PKGROOT/opt/handbrake-rk3588/lib" "$PKGROOT/usr/bin"
          cp bundle/bin/HandBrakeCLI "$PKGROOT/opt/handbrake-rk3588/bin/"
          cp bundle/lib/* "$PKGROOT/opt/handbrake-rk3588/lib/" 2>/dev/null || true
          cat > "$PKGROOT/usr/bin/handbrake-cli-rk3588" << 'EOF'
          #!/bin/sh
          export LD_LIBRARY_PATH=/opt/handbrake-rk3588/lib:${LD_LIBRARY_PATH}
          exec /opt/handbrake-rk3588/bin/HandBrakeCLI "$@"
          EOF
          chmod 0755 "$PKGROOT/usr/bin/handbrake-cli-rk3588"
          cat > "$PKGROOT/DEBIAN/control" << 'EOF'
          Package: handbrake-cli-rk3588
          Version: 1.0.0
          Section: video
          Priority: optional
          Architecture: arm64
          Maintainer: emcd39 <emcd39@example.com>
          Depends: libc6, libstdc++6
          Description: HandBrake CLI for RK3588 with bundled RKMPP/RKRGA runtime
           CLI wrapper command: handbrake-cli-rk3588
          EOF
          dpkg-deb --build "$PKGROOT" handbrake-cli-rkmpp-arm64.deb

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: handbrake-cli-rkmpp-arm64
          path: |
            bundle/
            handbrake-cli-rkmpp-arm64.deb
          retention-days: 7
          if-no-files-found: warn

  build-gtk:
    runs-on: ubuntu-24.04-arm
    if: ${{ github.event_name == 'push' || inputs.gtk == 'true' }}
    steps:
      - name: Checkout HandBrake
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
          build-essential \
          pkg-config \
          nasm \
          cmake \
          meson \
          ninja-build \
          autoconf \
          automake \
          libtool \
          libtool-bin \
          m4 \
          python3 \
          python3-pip \
          wget \
          curl \
          git \
          libdrm-dev \
          libgtk-4-dev \
          libglib2.0-dev \
          libgstreamer1.0-dev \
          libgstreamer-plugins-base1.0-dev \
          libwebkit2gtk-4.1-dev \
          libnotify-dev \
          intltool \
          libgudev-1.0-dev \
          libadwaita-1-dev \
          libass-dev \
          libmp3lame-dev \
          libopus-dev \
          libspeex-dev \
          libvpx-dev \
          libbluray-dev \
          libdvdnav-dev \
          libdvdread-dev \
          libjansson-dev \
          libx264-dev \
          libx265-dev \
          bzip2 \
          zlib1g-dev \
          libnuma-dev \
          libturbojpeg-dev \
          libogg-dev \
          libvorbis-dev \
          libtheora-dev \
          libsvtav1-dev \
          libxml2-dev

      - name: Clone RKMPP (nyanmisaka)
        run: |
          mkdir -p deps
          cd deps
          git clone --depth 1 https://github.com/emcd39/mpp.git rkmpp
          echo "RKMPP_DIR=$(pwd)/rkmpp" >> $GITHUB_ENV

      - name: Clone RKRGA (nyanmisaka jellyfin-rga branch)
        run: |
          mkdir -p deps
          cd deps
          git clone --depth 1 --branch jellyfin-rga https://github.com/emcd39/rga.git rkrga
          echo "RKRGA_DIR=$(pwd)/rkrga" >> $GITHUB_ENV

      - name: Build and install RKMPP
        run: |
          cd deps/rkmpp
          mkdir -p build && cd build
          cmake .. -DCMAKE_INSTALL_PREFIX=/usr/local
          make -j$(nproc)
          sudo make install

      - name: Build and install RKRGA (meson)
        run: |
          cd deps/rkrga
          meson setup rkrga_build \
            --prefix=/usr/local \
            --libdir=lib \
            --buildtype=release \
            --default-library=shared \
            -Dcpp_args=-fpermissive \
            -Dlibdrm=false \
            -Dlibrga_demo=false
          meson configure rkrga_build
          ninja -C rkrga_build
          sudo ninja -C rkrga_build install

      - name: Configure HandBrake GTK with RKMPP
        run: |
          export PKG_CONFIG_PATH=/usr/local/lib/pkgconfig:/usr/lib/pkgconfig:$PKG_CONFIG_PATH
          ./configure --enable-gtk --enable-rkmpp --force
          ls -la build/

      - name: Build HandBrake GTK
        run: |
          cd build
          make -j$(nproc) 2>&1 | tee build.log
          echo "=== Build log tail ==="
          tail -100 build.log

      - name: List build outputs
        run: |
          echo "=== Build directory contents ==="
          ls -la build/
          echo "=== GTK build directory contents ==="
          ls -la build/gtk/ 2>/dev/null || echo "No gtk subdir"
          echo "=== Looking for ghb binary ==="
          find build -name "ghb" -type f 2>/dev/null

      - name: Prepare GTK runtime bundle
        run: |
          mkdir -p bundle/bin bundle/lib
          cp build/gtk/src/ghb bundle/bin/
          cp build/HandBrakeCLI bundle/bin/ 2>/dev/null || true
          cp /usr/local/lib/librockchip_mpp.so* bundle/lib/ 2>/dev/null || true
          cp /usr/local/lib/librga.so* bundle/lib/ 2>/dev/null || true
          cp /usr/local/lib/libmpp.so* bundle/lib/ 2>/dev/null || true
          cp /usr/local/lib/libdrm.so* bundle/lib/ 2>/dev/null || true
          ldd bundle/bin/ghb || true

      - name: Build GTK Debian package
        run: |
          PKGROOT="$PWD/pkg-gtk"
          rm -rf "$PKGROOT" handbrake-gtk-rkmpp-arm64.deb
          mkdir -p "$PKGROOT/DEBIAN" "$PKGROOT/opt/handbrake-rk3588/bin" "$PKGROOT/opt/handbrake-rk3588/lib" "$PKGROOT/usr/bin"
          cp bundle/bin/ghb "$PKGROOT/opt/handbrake-rk3588/bin/"
          cp bundle/bin/HandBrakeCLI "$PKGROOT/opt/handbrake-rk3588/bin/" 2>/dev/null || true
          cp bundle/lib/* "$PKGROOT/opt/handbrake-rk3588/lib/" 2>/dev/null || true
          cat > "$PKGROOT/usr/bin/ghb-rk3588" << 'EOF'
          #!/bin/sh
          export LD_LIBRARY_PATH=/opt/handbrake-rk3588/lib:${LD_LIBRARY_PATH}
          exec /opt/handbrake-rk3588/bin/ghb "$@"
          EOF
          cat > "$PKGROOT/usr/bin/handbrake-cli-rk3588" << 'EOF'
          #!/bin/sh
          export LD_LIBRARY_PATH=/opt/handbrake-rk3588/lib:${LD_LIBRARY_PATH}
          exec /opt/handbrake-rk3588/bin/HandBrakeCLI "$@"
          EOF
          chmod 0755 "$PKGROOT/usr/bin/ghb-rk3588" "$PKGROOT/usr/bin/handbrake-cli-rk3588"
          cat > "$PKGROOT/DEBIAN/control" << 'EOF'
          Package: handbrake-gtk-rk3588
          Version: 1.0.0
          Section: video
          Priority: optional
          Architecture: arm64
          Maintainer: emcd39 <emcd39@example.com>
          Depends: libc6, libstdc++6, libgtk-4-1, libadwaita-1-0
          Description: HandBrake GTK for RK3588 with bundled RKMPP/RKRGA runtime
           GUI wrapper command: ghb-rk3588
          EOF
          dpkg-deb --build "$PKGROOT" handbrake-gtk-rkmpp-arm64.deb

      - name: Upload GTK artifact
        uses: actions/upload-artifact@v4
        with:
          name: handbrake-gtk-rkmpp-arm64
          path: |
            bundle/
            handbrake-gtk-rkmpp-arm64.deb
          retention-days: 7
          if-no-files-found: warn
